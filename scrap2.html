<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pita Kaset CSS & JS</title>

    <!-- Mengimpor font bergaya tulisan tangan untuk label kaset -->
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Courier+Prime:wght@700&display=swap"
        rel="stylesheet">

    <style>
        /* Pengaturan dasar halaman */
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at center, #34495e, #1a252f);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        .header-text {
            text-align: center;
            margin-bottom: 30px;
        }

        .page-title {
            color: #ecf0f1;
            font-family: 'Permanent Marker', cursive, sans-serif;
            font-size: 36px;
            margin: 0 0 5px 0;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .page-subtitle {
            color: #bdc3c7;
            font-size: 15px;
            margin: 0;
        }

        /* Container utama agar responsif */
        .scaler {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Dek pemutar kaset (background luar) */
        .player-deck {
            background: #1e272e;
            padding: 40px;
            border-radius: 20px;
            box-shadow:
                0 20px 50px rgba(0, 0, 0, 0.8),
                inset 0 2px 10px rgba(255, 255, 255, 0.05),
                inset 0 -5px 15px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 100%;
        }

        /* Bodi Utama Kaset */
        .cassette {
            width: 400px;
            height: 260px;
            background-color: #a4b0be;
            background-image: linear-gradient(135deg, #a4b0be 0%, #747d8c 100%);
            border-radius: 15px;
            position: relative;
            box-shadow:
                0 15px 25px rgba(0, 0, 0, 0.6),
                inset 0 2px 0 rgba(255, 255, 255, 0.2),
                inset 0 -3px 0 rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        /* Garis lekukan plastik di sekelliling kaset */
        .cassette::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 1.5px solid rgba(0, 0, 0, 0.15);
            border-radius: 10px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
            pointer-events: none;
        }

        /* Merek embos di bagian atas plastik */
        .cassette-brand {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-family: Arial, sans-serif;
            font-weight: 900;
            color: rgba(0, 0, 0, 0.15);
            font-size: 14px;
            letter-spacing: 5px;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        /* Baut kaset di 4 sudut */
        .screw {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #888;
            border-radius: 50%;
            box-shadow:
                inset 0 -2px 3px rgba(0, 0, 0, 0.7),
                0 1px 1px rgba(255, 255, 255, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .screw::after {
            content: '';
            width: 8px;
            height: 1.5px;
            background: #222;
            transform: rotate(45deg);
        }

        .screw-tl {
            top: 15px;
            left: 15px;
        }

        .screw-tr {
            top: 15px;
            right: 15px;
        }

        .screw-bl {
            bottom: 15px;
            left: 15px;
        }

        .screw-br {
            bottom: 15px;
            right: 15px;
        }

        /* Label / Stiker Kaset */
        .sticker {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 330px;
            height: 150px;
            background: linear-gradient(180deg, #fbc531, #e1b12c);
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        /* Bagian atas label (merah) */
        .sticker-top {
            height: 30px;
            background: #c0392b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            color: #fff;
            font-family: 'Courier Prime', monospace;
            font-weight: bold;
            font-size: 13px;
            box-shadow: 0 2px 3px rgba(0, 0, 0, 0.2);
        }

        .side-indicator {
            background: #fff;
            color: #c0392b;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 15px;
        }

        /* Jendela transparan di tengah kaset */
        .window-container {
            width: 230px;
            height: 60px;
            background: rgba(47, 53, 66, 0.95);
            margin: 12px auto;
            border-radius: 8px;
            border: 2px solid rgba(0, 0, 0, 0.4);
            box-shadow:
                inset 0 3px 10px rgba(0, 0, 0, 0.9),
                0 1px 0 rgba(255, 255, 255, 0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 35px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            /* Penting agar gulungan pita terpotong rapi di batas jendela */
        }

        /* Pantulan kaca plastik pada jendela */
        .window-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0) 40%, rgba(255, 255, 255, 0.05) 100%);
            pointer-events: none;
            z-index: 5;
        }

        /* Penanda waktu / garis-garis di kaca tengah */
        .markings {
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            align-items: flex-end;
            z-index: 4;
        }

        .mark {
            width: 2px;
            height: 6px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 1px;
        }

        .mark:nth-child(even) {
            height: 10px;
        }

        /* Container agar gulungan pita tetap di tengah roda gigi */
        .tape-roll-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 32px;
            height: 32px;
        }

        /* Roda gigi putih (Spool) */
        .reel {
            width: 32px;
            height: 32px;
            background: #ced6e0;
            border-radius: 50%;
            position: relative;
            z-index: 2;
            box-shadow: 0 0 3px rgba(0, 0, 0, 0.8);

            /* Animasi putaran kebalikan arah jarum jam (standar kaset) */
            animation: spin-ccw 2.5s linear infinite;
            animation-play-state: paused;
            /* Berhenti secara default */
        }

        /* Lubang tengah tempat masuknya pemutar deck */
        .center-hole {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 50%;
            z-index: 3;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 1);
        }

        /* Gigi / celah pada roda reel kaset (biasanya ada 6) */
        .spoke {
            position: absolute;
            width: 4px;
            height: 10px;
            background: rgba(0, 0, 0, 0.7);
            top: 2px;
            left: 14px;
            /* Setengah dari 32px dikurangi 2px */
            transform-origin: 2px 14px;
            /* Titik putar tepat di tengah reel */
            border-radius: 1px;
        }

        .spoke:nth-child(1) {
            transform: rotate(0deg);
        }

        .spoke:nth-child(2) {
            transform: rotate(60deg);
        }

        .spoke:nth-child(3) {
            transform: rotate(120deg);
        }

        .spoke:nth-child(4) {
            transform: rotate(180deg);
        }

        .spoke:nth-child(5) {
            transform: rotate(240deg);
        }

        .spoke:nth-child(6) {
            transform: rotate(300deg);
        }

        /* Visual gulungan pita magnetik berwarna gelap dengan tekstur melingkar */
        .tape-roll {
            position: absolute;
            border-radius: 50%;
            background: repeating-radial-gradient(circle at center, #111 0px, #111 2px, #1f1f1f 3px, #1f1f1f 4px);
            z-index: 1;
            /* Transisi mulus saat pita berpindah sisi */
            transition: width 0.1s linear, height 0.1s linear;
        }

        /* Bagian judul stiker (di bawah jendela) */
        .sticker-middle {
            position: absolute;
            bottom: 5px;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .sticker-title {
            font-family: 'Permanent Marker', cursive;
            font-size: 24px;
            color: #2c3e50;
            text-align: center;
            margin-bottom: 5px;
            transform: rotate(-2deg);
        }

        .line {
            border-bottom: 2px solid rgba(0, 0, 0, 0.15);
            height: 15px;
            width: 100%;
        }

        /* Bagian tebal trapesium di bagian bawah tempat pita dibaca oleh Head Player */
        .bottom-part {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 290px;
            height: 45px;
            background: linear-gradient(180deg, #8a939f, #57606f);
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            box-shadow: inset 0 2px 2px rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-evenly;
            align-items: flex-end;
            padding-bottom: 0px;
            box-sizing: border-box;
            z-index: 5;
        }

        /* Lubang-lubang di dasar kaset tempat pita terlihat */
        .cutout {
            width: 25px;
            height: 15px;
            background: #0a0a0a;
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 1);
            position: relative;
        }

        /* Sedikit pita yang terlihat di dalam lubang */
        .cutout::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: #111;
            box-shadow: 0 -1px 1px rgba(255, 255, 255, 0.1);
        }

        /* ---- AREA KONTROL UI ---- */

        .controls-wrapper {
            width: 100%;
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .progress-container {
            width: 100%;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: #2f3640;
            height: 8px;
            border-radius: 4px;
            outline: none;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.8);
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #e84118;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
            transition: transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }

        .player-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            background: #2f3640;
            padding: 15px;
            border-radius: 10px;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .control-btn {
            background: linear-gradient(180deg, #dcdde1, #7f8fa6);
            border: none;
            border-radius: 5px;
            width: 70px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 5px 0 #353b48, 0 6px 10px rgba(0, 0, 0, 0.4);
            color: #2f3640;
            transition: all 0.1s;
        }

        .control-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #353b48, 0 2px 5px rgba(0, 0, 0, 0.4);
        }

        .control-btn svg {
            pointer-events: none;
            /* Penting agar klik hanya terdeteksi di tombol */
        }

        /* Animasi saat pita kaset berjalan */
        .cassette.playing .reel {
            animation-play-state: running;
            /* Lanjutkan putaran tanpa mereset sudut */
        }

        @keyframes spin-ccw {
            100% {
                transform: rotate(-360deg);
            }
        }

        /* Responsivitas untuk layar handphone */
        @media (max-width: 500px) {
            .scaler {
                transform: scale(0.85);
                margin-top: -30px;
            }
        }

        @media (max-width: 400px) {
            .scaler {
                transform: scale(0.7);
                margin-top: -50px;
            }
        }
    </style>
</head>

<body>

    <div class="header-text">
        <h1 class="page-title">Pita Kaset CSS</h1>
        <p class="page-subtitle">Visual, Fisika Pita, dan Suara yang Sepenuhnya Fungsional.</p>
    </div>

    <div class="scaler">
        <div class="player-deck">

            <!-- Bodi Kaset -->
            <div class="cassette" id="cassette-tape">
                <div class="cassette-brand">SUPER TAPE</div>

                <div class="screw screw-tl"></div>
                <div class="screw screw-tr"></div>
                <div class="screw screw-bl"></div>
                <div class="screw screw-br"></div>

                <!-- Label Kaset -->
                <div class="sticker">
                    <div class="sticker-top">
                        <span>STEREO</span>
                        <span class="side-indicator">A</span>
                        <span>NR [ ]</span>
                    </div>

                    <div class="window-container">
                        <!-- Pita Sisi Kiri (Berkurang saat dimainkan) -->
                        <div class="tape-roll-wrapper left">
                            <div class="tape-roll" id="left-roll"></div>
                            <div class="reel">
                                <div class="spoke"></div>
                                <div class="spoke"></div>
                                <div class="spoke"></div>
                                <div class="spoke"></div>
                                <div class="spoke"></div>
                                <div class="spoke"></div>
                                <div class="center-hole"></div>
                            </div>
                        </div>

                        <div class="markings">
                            <div class="mark"></div>
                            <div class="mark"></div>
                            <div class="mark"></div>
                            <div class="mark"></div>
                            <div class="mark"></div>
                            <div class="mark"></div>
                            <div class="mark"></div>
                        </div>

                        <!-- Pita Sisi Kanan (Bertambah saat dimainkan) -->
                        <div class="tape-roll-wrapper right">
                            <div class="tape-roll" id="right-roll"></div>
                            <div class="reel">
                                <div class="spoke"></div>
                                <div class="spoke"></div>
                                <div class="spoke"></div>
                                <div class="spoke"></div>
                                <div class="spoke"></div>
                                <div class="spoke"></div>
                                <div class="center-hole"></div>
                            </div>
                        </div>
                    </div>

                    <div class="sticker-middle">
                        <div class="sticker-title">KaSet MiX VoL. 1</div>
                        <div class="line"></div>
                        <div class="line"></div>
                    </div>
                </div>

                <div class="bottom-part">
                    <div class="cutout"></div>
                    <div class="cutout"></div>
                    <div class="cutout"></div>
                    <div class="cutout"></div>
                </div>
            </div>

            <!-- Kontrol Pemutar -->
            <div class="controls-wrapper">
                <div class="progress-container" title="Geser untuk memutar waktu pita">
                    <input type="range" id="progress-bar" min="0" max="100" value="0">
                </div>

                <div class="player-controls">
                    <button id="btn-play" class="control-btn" title="Putar / Jeda">
                        <svg id="icon-play" viewBox="0 0 24 24" width="28" height="28">
                            <path fill="currentColor" d="M8 5v14l11-7z" />
                        </svg>
                    </button>
                    <button id="btn-stop" class="control-btn" title="Berhenti & Putar Ulang">
                        <svg viewBox="0 0 24 24" width="28" height="28">
                            <path fill="currentColor" d="M6 6h12v12H6z" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Musik Latar (Royalty Free / Contoh Aman) -->
            <audio id="audio-player" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
                preload="metadata" crossorigin="anonymous"></audio>

        </div>
    </div>

    <script>
        const audio = document.getElementById('audio-player');
        const btnPlay = document.getElementById('btn-play');
        const btnStop = document.getElementById('btn-stop');
        const iconPlay = document.getElementById('icon-play');
        const cassette = document.getElementById('cassette-tape');
        const progressBar = document.getElementById('progress-bar');

        const leftRoll = document.getElementById('left-roll');
        const rightRoll = document.getElementById('right-roll');

        // Parameter ukuran fisik pita kaset dalam pixel
        const MIN_ROLL = 34; // Batas kecil pita saat habis
        const MAX_ROLL = 120; // Batas besar pita saat penuh
        const DUMMY_DURATION = 300; // 5 menit fallback jika audio gagal termuat

        let isDragging = false;

        // Ikon Path
        const pathPlay = "M8 5v14l11-7z";
        const pathPause = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";

        // Fungsi memperbarui ukuran gulungan fisik pita (Kiri mengecil, Kanan membesar)
        function updateTapeSizes(percentage) {
            // Batasi persentase antara 0 sampai 1
            const p = Math.max(0, Math.min(1, percentage));

            const leftSize = MAX_ROLL - ((MAX_ROLL - MIN_ROLL) * p);
            const rightSize = MIN_ROLL + ((MAX_ROLL - MIN_ROLL) * p);

            leftRoll.style.width = `${leftSize}px`;
            leftRoll.style.height = `${leftSize}px`;

            rightRoll.style.width = `${rightSize}px`;
            rightRoll.style.height = `${rightSize}px`;
        }

        // Sinkronisasi status animasi kaset sesuai dengan status pemutar audio
        audio.addEventListener('play', () => {
            cassette.classList.add('playing');
            iconPlay.innerHTML = `<path fill="currentColor" d="${pathPause}"/>`;
        });

        audio.addEventListener('pause', () => {
            cassette.classList.remove('playing');
            iconPlay.innerHTML = `<path fill="currentColor" d="${pathPlay}"/>`;
        });

        // Event Tombol Putar/Jeda
        btnPlay.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().catch(err => {
                    console.log("Audio gagal diputar (mungkin butuh interaksi pengguna atau jaringan terputus):", err);
                    alert("Gagal memutar aliran audio. Memulai simulasi visual pita.");
                    // Simulasi visual jika audio gagal
                    cassette.classList.add('playing');
                    iconPlay.innerHTML = `<path fill="currentColor" d="${pathPause}"/>`;
                });
            } else {
                audio.pause();
            }
        });

        // Event Tombol Stop (Berhenti total & Putar Ulang)
        btnStop.addEventListener('click', () => {
            audio.pause();
            audio.currentTime = 0;
            progressBar.value = 0;
            updateTapeSizes(0);
        });

        // Event saat audio berjalan otomatis memperbarui slider dan gulungan pita
        audio.addEventListener('timeupdate', () => {
            if (!isDragging) {
                const duration = audio.duration || DUMMY_DURATION;
                const percentage = audio.currentTime / duration;

                progressBar.value = percentage * 100;
                updateTapeSizes(percentage);
            }
        });

        // Logika Slider Rentang Kemajuan Waktu
        progressBar.addEventListener('mousedown', () => isDragging = true);
        progressBar.addEventListener('touchstart', () => isDragging = true);

        progressBar.addEventListener('mouseup', () => isDragging = false);
        progressBar.addEventListener('touchend', () => isDragging = false);

        progressBar.addEventListener('input', (e) => {
            const percentage = e.target.value / 100;
            const duration = audio.duration || DUMMY_DURATION;

            if (!isNaN(audio.duration)) {
                audio.currentTime = percentage * duration;
            }

            // Perbarui visual perpindahan pita langsung secara mulus
            updateTapeSizes(percentage);
        });

        // Saat lagu selesai
        audio.addEventListener('ended', () => {
            audio.pause();
            audio.currentTime = 0;
            cassette.classList.remove('playing');
            iconPlay.innerHTML = `<path fill="currentColor" d="${pathPlay}"/>`;
            updateTapeSizes(0); // Rewind fisik kembali penuh ke kiri
        });

        // Inisialisasi awal pita yang tergulung penuh di sisi Kiri
        updateTapeSizes(0);

    </script>
</body>

</html>
